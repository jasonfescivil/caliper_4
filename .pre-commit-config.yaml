# Pre-commit hooks for Caliper
# Install: uv tools install pre-commit
# Setup: pre-commit install

repos:
  # Format Python code with black
  - repo: https://github.com/psf/black
    rev: 24.1.0
    hooks:
      - id: black
        language_version: python3.12
        args: [--line-length=100]

  # Sort imports
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black, --line-length=100]
        exclude: ^data_v2/

  # Lint with ruff (fast!)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        exclude: ^data_v2/|(^|/)gpt5\.py$

  # Security checks
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: ^(data_v2/|outputs/|\.venv.*|.*\.lock$|package-lock\.json$)

  # Check yaml files
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-yaml
        exclude: ^(.github/workflows/|docker-compose)
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: ['--maxkb=1000']
        exclude: ^data_v2/
      - id: check-merge-conflict
      - id: check-toml
      - id: debug-statements
      - id: mixed-line-ending

  # Type checking with mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-PyYAML
          - types-requests
        args: [--ignore-missing-imports]
        files: ^src/.*\.py$
        exclude: ^(\.venv.*|data_v2/)

  # Run fast tests (< 5s) before commit
  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest-fast
        entry: poetry run pytest
        language: system
        pass_filenames: false
        args: [-m, "not slow", --tb=short, -q]
        stages: [pre-commit]

      # IDE rules sync check (strict) — blocks commit if .clinerules/.cursor wrappers stale
      - id: ide-rules-sync
        name: ide-rules-sync
        entry: python scripts/sync_ide_rules.py --check
        language: system
        pass_filenames: false
        stages: [pre-commit]

  # Check for common security issues
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        args: ['-ll', '-r', 'src/']
        exclude: ^tests/

  # Poetry lock file check
  - repo: https://github.com/python-poetry/poetry
    rev: 1.7.0
    hooks:
      - id: poetry-check
      - id: poetry-lock
        args: [--no-update]

# Configuration
default_stages: [pre-commit]
fail_fast: false
minimum_pre_commit_version: 3.0.0
default_language_version:
  python: python3.12
